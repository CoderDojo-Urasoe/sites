<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoderDojo 浦添 - 記事生成ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>記事ジェネレーター (Admin)</h1>
            <p>開催レポート等のニュース記事を生成します。</p>
        </header>

        <main>
            <form id="generator-form">
                <div class="form-group">
                    <label for="article-date">開催日付 (YYYYMMDD)</label>
                    <input type="text" id="article-date" name="date" placeholder="例: 20190804" required pattern="\d{8}">
                </div>

                <div class="form-group">
                    <label for="article-title">記事タイトル</label>
                    <input type="text" id="article-title" name="title" placeholder="例: [開催レポ] 第9回浦添プログラミング道場" required>
                </div>

                <div class="form-group">
                    <label for="article-content">記事本文</label>
                    <textarea id="article-content" name="content" rows="6" placeholder="開催レポートの本文を入力してください（複数行可）。" required></textarea>
                </div>

                <div class="form-group photo-section">
                    <label>写真の選択</label>
                    <p class="description">Google Photosから記事に使用する写真を選んでください。</p>
                    <button type="button" id="btn-pick-photos" class="btn btn-secondary">Google Photosを開く</button>
                    
                    <div id="selected-photos-preview" class="preview-area">
                        <!-- 選択した写真のプレビューがここに表示されます -->
                    </div>
                </div>

                <button type="submit" id="btn-generate" class="btn btn-primary">記事を生成する</button>
            </form>

            <div id="status-message" class="status-message hidden"></div>
        </main>
    </div>

    <!-- Google Identity Services (OAuth認証用) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="app.js"></script>
</body>
</html>
